<!DOCTYPE html>
<html lang="en" class="bg-black font-mono text-[#00ff00]">
    <head>

        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Scroll</title>
        <meta name="description" content="Scroll score page">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <div id="square" class="mt-4 h-20 w-20 bg-[#00ff00]"></div>

        <script src="main.js" async defer></script>

</html>
